<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="940" viewBox="0 0 1500 940" role="img" aria-labelledby="title desc">
  <title id="title">Metis コア範囲ER図</title>
  <desc id="desc">利用者、ガイド生成、学習ガイド進捗、AI評価教材化、教材の中核テーブルだけを抜粋したER図</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
    <style><![CDATA[
      .bg { fill: #f8fafc; stroke: #d7deea; stroke-width: 1.4; }
      .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #172033; }
      .subtitle { font: 14px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #64748b; }
      .group-title { font: 700 16px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #314d7f; }
      .box { fill: #ffffff; stroke: #314d7f; stroke-width: 1.7; }
      .box-soft { fill: #eef5ff; stroke: #314d7f; stroke-width: 1.7; }
      .box-title { font: 700 14px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #172033; }
      .box-key { font: 12px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #314d7f; }
      .box-col { font: 11px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #64748b; }
      .edge { fill: none; stroke: #64748b; stroke-width: 1.6; marker-end: url(#arrow); opacity: .8; }
      .edge-label { font: 10px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #475569; paint-order: stroke; stroke: #ffffff; stroke-width: 4px; }
      .note { font: 12px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #475569; }
    ]]></style>
  </defs>

  <rect x="0" y="0" width="1500" height="940" fill="#ffffff" />
  <text x="36" y="42" class="title">Metis コア範囲ER図</text>
  <text x="36" y="67" class="subtitle">ゴール入力 → ガイド生成 → ガイド進行 → AI相談・評価 → 教材化 → 教材閲覧に必要な範囲だけを抜粋</text>

  <rect x="25" y="90" width="260" height="765" rx="18" class="bg" />
  <text x="45" y="120" class="group-title">利用者・前提設定</text>

  <rect x="315" y="90" width="270" height="765" rx="18" class="bg" />
  <text x="335" y="120" class="group-title">ガイド生成</text>

  <rect x="615" y="90" width="270" height="765" rx="18" class="bg" />
  <text x="635" y="120" class="group-title">学習ガイド・進捗</text>

  <rect x="915" y="90" width="270" height="765" rx="18" class="bg" />
  <text x="935" y="120" class="group-title">AI評価・教材化</text>

  <rect x="1215" y="90" width="260" height="765" rx="18" class="bg" />
  <text x="1235" y="120" class="group-title">教材</text>

  <!-- Edges -->
  <path d="M250 185 C285 185 285 185 320 185" class="edge"/><text x="278" y="174" class="edge-label">入力</text>
  <path d="M250 305 C285 305 285 305 320 305" class="edge"/><text x="271" y="294" class="edge-label">依頼</text>
  <path d="M535 185 C575 185 575 185 620 185" class="edge"/><text x="552" y="174" class="edge-label">生成起動</text>
  <path d="M535 305 C575 305 575 185 620 185" class="edge"/><text x="552" y="248" class="edge-label">成果物</text>
  <path d="M535 420 C575 420 575 185 620 185" class="edge"/><text x="552" y="330" class="edge-label">本文生成</text>
  <path d="M535 530 C575 530 575 530 620 530" class="edge"/><text x="552" y="519" class="edge-label">AI記録</text>
  <path d="M535 645 C575 645 575 645 620 645" class="edge"/><text x="552" y="634" class="edge-label">検査</text>
  <path d="M835 185 C875 185 875 305 920 305" class="edge"/><text x="855" y="245" class="edge-label">進捗</text>
  <path d="M835 305 C875 305 875 305 920 305" class="edge"/><text x="850" y="294" class="edge-label">章</text>
  <path d="M835 420 C875 420 875 420 920 420" class="edge"/><text x="850" y="409" class="edge-label">ステップ</text>
  <path d="M835 530 C875 530 875 530 920 530" class="edge"/><text x="850" y="519" class="edge-label">相談</text>
  <path d="M835 645 C875 645 875 645 920 645" class="edge"/><text x="850" y="634" class="edge-label">完了</text>
  <path d="M1135 305 C1175 305 1175 185 1220 185" class="edge"/><text x="1150" y="245" class="edge-label">教材化</text>
  <path d="M1135 420 C1175 420 1175 305 1220 305" class="edge"/><text x="1150" y="365" class="edge-label">評価結果</text>
  <path d="M1135 645 C1175 645 1175 185 1220 185" class="edge"/><text x="1147" y="585" class="edge-label">作成</text>
  <path d="M1435 185 C1460 185 1460 305 1435 305" class="edge"/><text x="1440" y="245" class="edge-label">版管理</text>
  <path d="M1435 305 C1460 305 1460 420 1435 420" class="edge"/><text x="1440" y="365" class="edge-label">構成</text>

  <!-- 利用者 -->
  <rect x="45" y="145" width="205" height="80" rx="12" class="box-soft" />
  <text x="60" y="171" class="box-title">利用者</text>
  <text x="60" y="194" class="box-key">PK: 利用者ID</text>
  <text x="60" y="214" class="box-col">状態 / ロール / 登録日時</text>

  <rect x="45" y="265" width="205" height="80" rx="12" class="box" />
  <text x="60" y="291" class="box-title">利用者プロフィール</text>
  <text x="60" y="314" class="box-key">PK/FK: 利用者ID</text>
  <text x="60" y="334" class="box-col">表示名 / 自己紹介 / 画像</text>

  <rect x="45" y="385" width="205" height="80" rx="12" class="box" />
  <text x="60" y="411" class="box-title">学習スタイル既定値</text>
  <text x="60" y="434" class="box-key">PK/FK: 利用者ID</text>
  <text x="60" y="454" class="box-col">難易度 / 説明粒度 / 言語</text>

  <rect x="45" y="525" width="205" height="80" rx="12" class="box" />
  <text x="60" y="551" class="box-title">技術タグ</text>
  <text x="60" y="574" class="box-key">PK: 技術タグID</text>
  <text x="60" y="594" class="box-col">タグ名 / 分類 / 難易度</text>

  <!-- 生成 -->
  <rect x="320" y="145" width="215" height="80" rx="12" class="box-soft" />
  <text x="335" y="171" class="box-title">学習ゴール下書き</text>
  <text x="335" y="194" class="box-key">PK: ゴール下書きID</text>
  <text x="335" y="214" class="box-col">ゴール本文 / 安全性 / 状態</text>

  <rect x="320" y="265" width="215" height="80" rx="12" class="box-soft" />
  <text x="335" y="291" class="box-title">ジョブ</text>
  <text x="335" y="314" class="box-key">PK: ジョブID</text>
  <text x="335" y="334" class="box-col">種別 / 状態 / 進捗率</text>

  <rect x="320" y="380" width="215" height="80" rx="12" class="box" />
  <text x="335" y="406" class="box-title">ガイド生成ジョブ詳細</text>
  <text x="335" y="429" class="box-key">PK/FK: ジョブID</text>
  <text x="335" y="449" class="box-col">ゴール / 版 / スタイル</text>

  <rect x="320" y="490" width="215" height="80" rx="12" class="box" />
  <text x="335" y="516" class="box-title">AI実行</text>
  <text x="335" y="539" class="box-key">PK: AI実行ID</text>
  <text x="335" y="559" class="box-col">用途 / モデル / 入出力パス</text>

  <rect x="320" y="605" width="215" height="80" rx="12" class="box" />
  <text x="335" y="631" class="box-title">ガードレール検査結果</text>
  <text x="335" y="654" class="box-key">PK: 検査結果ID</text>
  <text x="335" y="674" class="box-col">検査種別 / 判定 / 理由</text>

  <!-- ガイド進捗 -->
  <rect x="620" y="145" width="215" height="80" rx="12" class="box-soft" />
  <text x="635" y="171" class="box-title">学習ガイド</text>
  <text x="635" y="194" class="box-key">PK: 学習ガイドID</text>
  <text x="635" y="214" class="box-col">タイトル / ゴール / 状態</text>

  <rect x="620" y="265" width="215" height="80" rx="12" class="box" />
  <text x="635" y="291" class="box-title">ガイド章</text>
  <text x="635" y="314" class="box-key">PK: ガイド章ID</text>
  <text x="635" y="334" class="box-col">タイトル / 表示順</text>

  <rect x="620" y="380" width="215" height="80" rx="12" class="box" />
  <text x="635" y="406" class="box-title">ガイドステップ</text>
  <text x="635" y="429" class="box-key">PK: ガイドステップID</text>
  <text x="635" y="449" class="box-col">本文 / 完了条件 / 表示順</text>

  <rect x="620" y="490" width="215" height="80" rx="12" class="box-soft" />
  <text x="635" y="516" class="box-title">ガイド進捗</text>
  <text x="635" y="539" class="box-key">PK: ガイド進捗ID</text>
  <text x="635" y="559" class="box-col">進捗率 / 現在章 / 現在ステップ</text>

  <rect x="620" y="605" width="215" height="80" rx="12" class="box" />
  <text x="635" y="631" class="box-title">AI相談メッセージ</text>
  <text x="635" y="654" class="box-key">PK: メッセージID</text>
  <text x="635" y="674" class="box-col">送信者 / 本文パス / 作成日時</text>

  <!-- 評価教材化 -->
  <rect x="920" y="265" width="215" height="80" rx="12" class="box" />
  <text x="935" y="291" class="box-title">コード評価ジョブ</text>
  <text x="935" y="314" class="box-key">PK/FK: ジョブID</text>
  <text x="935" y="334" class="box-col">進捗 / ステップ / 入力</text>

  <rect x="920" y="380" width="215" height="80" rx="12" class="box" />
  <text x="935" y="406" class="box-title">コード評価結果</text>
  <text x="935" y="429" class="box-key">PK: 評価結果ID</text>
  <text x="935" y="449" class="box-col">評価種別 / スコア / 要約</text>

  <rect x="920" y="490" width="215" height="80" rx="12" class="box-soft" />
  <text x="935" y="516" class="box-title">ガイド完了記録</text>
  <text x="935" y="539" class="box-key">PK: ガイド完了ID</text>
  <text x="935" y="559" class="box-col">完了日時 / 学習時間 / 進捗率</text>

  <rect x="920" y="605" width="215" height="80" rx="12" class="box" />
  <text x="935" y="631" class="box-title">AI評価サマリー</text>
  <text x="935" y="654" class="box-key">PK: AI評価サマリーID</text>
  <text x="935" y="674" class="box-col">総合評価 / 評価日時</text>

  <rect x="920" y="720" width="215" height="80" rx="12" class="box-soft" />
  <text x="935" y="746" class="box-title">教材化ジョブ</text>
  <text x="935" y="769" class="box-key">PK/FK: ジョブID</text>
  <text x="935" y="789" class="box-col">完了記録 / 作成教材ID</text>

  <!-- 教材 -->
  <rect x="1220" y="145" width="215" height="80" rx="12" class="box-soft" />
  <text x="1235" y="171" class="box-title">教材</text>
  <text x="1235" y="194" class="box-key">PK: 教材ID</text>
  <text x="1235" y="214" class="box-col">タイトル / 公開状態 / 価格</text>

  <rect x="1220" y="265" width="215" height="80" rx="12" class="box-soft" />
  <text x="1235" y="291" class="box-title">教材版</text>
  <text x="1235" y="314" class="box-key">PK: 教材版ID</text>
  <text x="1235" y="334" class="box-col">版番号 / 本文パス / 検証状態</text>

  <rect x="1220" y="380" width="215" height="80" rx="12" class="box" />
  <text x="1235" y="406" class="box-title">教材セクション</text>
  <text x="1235" y="429" class="box-key">PK: 教材セクションID</text>
  <text x="1235" y="449" class="box-col">タイトル / 表示順</text>

  <rect x="1220" y="490" width="215" height="80" rx="12" class="box" />
  <text x="1235" y="516" class="box-title">教材チャプター</text>
  <text x="1235" y="539" class="box-key">PK: 教材チャプターID</text>
  <text x="1235" y="559" class="box-col">本文パス / 所要秒数 / 表示順</text>

  <rect x="1220" y="605" width="215" height="80" rx="12" class="box" />
  <text x="1235" y="631" class="box-title">教材タグ関連</text>
  <text x="1235" y="654" class="box-key">PK: 教材ID + 技術タグID</text>
  <text x="1235" y="674" class="box-col">教材分類</text>

  <text x="36" y="895" class="note">除外: 課金・決済、管理者、監査ログ、組織、通知、フォロー、検索ログなど。初回レビューでは別紙扱い。</text>
</svg>
