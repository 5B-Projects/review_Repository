<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760" role="img" aria-labelledby="title desc">
  <title id="title">SC006 ガイド生成 コンポーネントツリー</title>
  <desc id="desc">ガイド生成画面のReactコンポーネント分割例</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b" /></marker>
    <style><![CDATA[
      .title { font: 700 25px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #172033; }
      .sub { font: 14px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #64748b; }
      .box { fill: #ffffff; stroke: #314d7f; stroke-width: 1.8; }
      .shared { fill: #eef5ff; stroke: #314d7f; stroke-width: 1.8; }
      .leaf { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.3; }
      .label { font: 700 15px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #172033; }
      .small { font: 11px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #5c6b80; }
      .edge { fill: none; stroke: #64748b; stroke-width: 1.5; marker-end: url(#arrow); }
      .tag { font: 10px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #314d7f; }
    ]]></style>
  </defs>
  <rect width="1320" height="760" fill="#ffffff" />
  <text x="36" y="45" class="title">SC006 ガイド生成 コンポーネントツリー</text>
  <text x="36" y="70" class="sub">ゴール入力、タグ選択、学習スタイル、構成案確認、生成ジョブ状態を分けて管理する</text>

  <rect x="520" y="105" width="280" height="72" rx="13" class="shared" />
  <text x="548" y="134" class="label">LearningGuideGenerationPage</text>
  <text x="548" y="157" class="small">ページ全体の状態・送信イベントを束ねる</text>

  <path d="M660 177 L195 235" class="edge" />
  <path d="M660 177 L410 235" class="edge" />
  <path d="M660 177 L630 235" class="edge" />
  <path d="M660 177 L850 235" class="edge" />
  <path d="M660 177 L1080 235" class="edge" />

  <rect x="75" y="235" width="240" height="85" rx="12" class="box" />
  <text x="98" y="266" class="label">GoalInputSection</text>
  <text x="98" y="289" class="small">作りたいもの・入力例・エラー</text>
  <text x="98" y="309" class="tag">保存先: goal_drafts</text>

  <rect x="330" y="235" width="240" height="85" rx="12" class="box" />
  <text x="353" y="266" class="label">TemplatePicker</text>
  <text x="353" y="289" class="small">テンプレートゴール選択</text>
  <text x="353" y="309" class="tag">入力補助。選択後は下書きへ反映</text>

  <rect x="585" y="235" width="240" height="85" rx="12" class="box" />
  <text x="608" y="266" class="label">TechnologyTagSelector</text>
  <text x="608" y="289" class="small">タグ検索・推奨タグ・選択数</text>
  <text x="608" y="309" class="tag">保存先: guide_selected_tags</text>

  <rect x="840" y="235" width="240" height="85" rx="12" class="box" />
  <text x="863" y="266" class="label">LearningStylePanel</text>
  <text x="863" y="289" class="small">難易度・説明粒度・学習方針</text>
  <text x="863" y="309" class="tag">保存先: generation_jobs snapshot</text>

  <rect x="1095" y="235" width="180" height="85" rx="12" class="box" />
  <text x="1116" y="266" class="label">ActionFooter</text>
  <text x="1116" y="289" class="small">下書き保存・生成開始</text>
  <text x="1116" y="309" class="tag">イベント発火</text>

  <path d="M195 320 L195 385" class="edge" />
  <path d="M450 320 L450 385" class="edge" />
  <path d="M705 320 L705 385" class="edge" />
  <path d="M960 320 L960 385" class="edge" />
  <path d="M1185 320 L1185 385" class="edge" />

  <rect x="75" y="385" width="240" height="70" rx="11" class="leaf" />
  <text x="98" y="414" class="label">GoalValidationMessage</text>
  <text x="98" y="436" class="small">必須・危険入力・文字数を表示</text>

  <rect x="330" y="385" width="240" height="70" rx="11" class="leaf" />
  <text x="353" y="414" class="label">TemplateGoalCard</text>
  <text x="353" y="436" class="small">入力例として使えるゴール候補</text>

  <rect x="585" y="385" width="240" height="70" rx="11" class="leaf" />
  <text x="608" y="414" class="label">TagCategoryGroup</text>
  <text x="608" y="436" class="small">言語・FW・DBなどカテゴリ表示</text>

  <rect x="840" y="385" width="240" height="70" rx="11" class="leaf" />
  <text x="863" y="414" class="label">StyleOverrideControl</text>
  <text x="863" y="436" class="small">既定値と生成時上書きを分離</text>

  <rect x="1095" y="385" width="180" height="70" rx="11" class="leaf" />
  <text x="1116" y="414" class="label">GenerateButton</text>
  <text x="1116" y="436" class="small">入力妥当時のみ活性</text>

  <rect x="135" y="535" width="300" height="90" rx="13" class="shared" />
  <text x="162" y="568" class="label">GuideOutlinePreview</text>
  <text x="162" y="592" class="small">生成前の構成案、承認、修正、再生成</text>
  <text x="162" y="614" class="tag">保存先: guide_outline_versions</text>

  <rect x="510" y="535" width="300" height="90" rx="13" class="shared" />
  <text x="537" y="568" class="label">GenerationJobStatusPanel</text>
  <text x="537" y="592" class="small">進捗率・待ち時間・失敗・再試行</text>
  <text x="537" y="614" class="tag">保存先: jobs / generation_jobs</text>

  <rect x="885" y="535" width="300" height="90" rx="13" class="shared" />
  <text x="912" y="568" class="label">GuardrailResultBanner</text>
  <text x="912" y="592" class="small">ブロック理由・安全性検査結果</text>
  <text x="912" y="614" class="tag">保存先: guardrail_results</text>

  <path d="M660 177 C660 500 285 500 285 535" class="edge" />
  <path d="M660 177 L660 535" class="edge" />
  <path d="M660 177 C660 500 1035 500 1035 535" class="edge" />

  <text x="40" y="705" class="small">[shared] 表示のノードは、他画面でも再利用しやすい候補。細かいButton/Inputはこのレビューでは省略。</text>
</svg>
