  <!-- relationship summary -->
  <rect x="40" y="880" width="1840" height="360" fill="#ffffff" stroke="#222222" stroke-width="1.2" />
  <text x="60" y="910" class="pkg-title">主要リレーション（all-er-diagrams.puml からコア範囲を抜粋）</text>
  <text x="60" y="945" class="note">USERS ||--o{ GOAL_DRAFTS : ゴール　/　USERS ||--o{ JOBS : 依頼　/　JOBS ||--o| GENERATION_JOBS : ガイド生成　/　GENERATION_JOBS ||--o| GUIDES : 成果物</text>
  <text x="60" y="975" class="note">GUIDES ||--o{ GUIDE_CHAPTERS : 章　/　GUIDE_CHAPTERS ||--o{ GUIDE_STEPS : ステップ　/　GUIDES ||--o{ GUIDE_PROGRESS : 進捗</text>
  <text x="60" y="1005" class="note">GUIDE_PROGRESS ||--o{ CHAPTER_PROGRESS : 章進捗　/　CHAPTER_PROGRESS ||--o{ STEP_PROGRESS : ステップ進捗　/　GUIDE_PROGRESS ||--o{ CHAT_MESSAGES : AI相談</text>
  <text x="60" y="1035" class="note">JOBS ||--|| EVALUATION_JOBS : コード評価　/　EVALUATION_JOBS ||--o{ EVALUATION_RESULTS : 評価結果　/　GUIDES ||--o{ GUIDE_COMPLETIONS : 完了記録</text>
  <text x="60" y="1065" class="note">GUIDE_COMPLETIONS ||--o| AI_EVALUATION_SUMMARIES : AI評価　/　JOBS ||--|| MATERIAL_CREATION_JOBS : 教材化　/　MATERIAL_CREATION_JOBS ||--o| MATERIALS : 教材</text>
