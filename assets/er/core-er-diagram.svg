<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1320" viewBox="0 0 1920 1320" role="img" aria-labelledby="title desc">
  <title id="title">コア範囲ER図（PlantUML風）</title>
  <desc id="desc">metisの全画面統合ER図の描き方に合わせ、コア範囲だけをpackage、entity、PK/FK、リレーションで表した図</desc>
  <defs>
    <style><![CDATA[
      .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', system-ui, sans-serif; fill: #111827; }
      .subtitle { font: 14px 'Hiragino Sans', 'Yu Gothic', system-ui, sans-serif; fill: #4b5563; }
      .pkg { fill: #ffffff; stroke: #222222; stroke-width: 1.6; }
      .pkg-title { font: 700 16px 'Hiragino Sans', 'Yu Gothic', system-ui, sans-serif; fill: #111827; }
      .entity { fill: #fffdf0; stroke: #222222; stroke-width: 1.2; }
      .entity-head { fill: #fef6c9; stroke: #222222; stroke-width: 1.2; }
      .entity-title { font: 700 13px 'Hiragino Sans', 'Yu Gothic', system-ui, sans-serif; fill: #111827; }
      .attr { font: 11px 'Hiragino Sans', 'Yu Gothic', system-ui, sans-serif; fill: #111827; }
      .pk { font: 700 11px 'Hiragino Sans', 'Yu Gothic', system-ui, sans-serif; fill: #111827; }
      .rel { fill: none; stroke: #222222; stroke-width: 1.15; }
      .rel-soft { fill: none; stroke: #555555; stroke-width: 1; stroke-dasharray: 4 4; }
      .rel-label { font: 10px 'Hiragino Sans', 'Yu Gothic', system-ui, sans-serif; fill: #111827; paint-order: stroke; stroke: #ffffff; stroke-width: 4px; }
      .note { font: 12px 'Hiragino Sans', 'Yu Gothic', system-ui, sans-serif; fill: #374151; }
    ]]></style>
  </defs>

  <rect width="1920" height="1320" fill="#ffffff" />
  <text x="32" y="42" class="title">コア範囲ER図（SC006〜SC009）</text>
  <text x="32" y="68" class="subtitle">5B-Projects/metis の all-er-diagrams.puml と同じ package / entity / PK・FK / リレーションの読み方に合わせたレビュー用抜粋</text>

  <!-- package backgrounds -->
  <rect x="30" y="95" width="300" height="320" class="pkg" />
  <text x="45" y="120" class="pkg-title">利用者・前提</text>

  <rect x="30" y="450" width="300" height="180" class="pkg" />
  <text x="45" y="475" class="pkg-title">タグ</text>

  <rect x="365" y="95" width="370" height="540" class="pkg" />
  <text x="380" y="120" class="pkg-title">ガイド生成</text>

  <rect x="770" y="95" width="365" height="700" class="pkg" />
  <text x="785" y="120" class="pkg-title">ガイド進行</text>

  <rect x="1170" y="95" width="350" height="560" class="pkg" />
  <text x="1185" y="120" class="pkg-title">評価・完了・教材化</text>

  <rect x="1555" y="95" width="330" height="560" class="pkg" />
  <text x="1570" y="120" class="pkg-title">教材</text>

  <!-- relationships behind entities -->
  <path d="M300 170 H395" class="rel" /><text x="330" y="160" class="rel-label">||--o{ ゴール</text>
  <path d="M300 250 H395" class="rel" /><text x="333" y="240" class="rel-label">||--o{ 依頼</text>
  <path d="M695 170 H805" class="rel" /><text x="720" y="160" class="rel-label">o| 成果物</text>
  <path d="M695 250 H805" class="rel" /><text x="718" y="240" class="rel-label">o{ 構成案</text>
  <path d="M1095 250 H1200" class="rel" /><text x="1125" y="240" class="rel-label">|| 評価</text>
  <path d="M1095 505 H1200" class="rel" /><text x="1118" y="495" class="rel-label">o{ コード評価</text>
  <path d="M1490 500 H1590" class="rel" /><text x="1515" y="490" class="rel-label">o| 教材</text>
  <path d="M1455 365 H1590" class="rel" /><text x="1490" y="355" class="rel-label">完了元</text>
  <path d="M1780 215 V300" class="rel" /><text x="1790" y="260" class="rel-label">||--o{ 版</text>
  <path d="M1780 390 V475" class="rel" /><text x="1790" y="435" class="rel-label">||--o{ 構成</text>
  <path d="M315 530 H1590" class="rel-soft" /><text x="880" y="520" class="rel-label">TECHNOLOGY_TAGS ||--o{ GUIDE_TAGS / MATERIAL_TAGS / GENERATION_JOB_TAGS</text>

