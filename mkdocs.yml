site_name: Metis 設計資料
site_description: 卒業制作 Metis の設計資料
site_url: https://5b-projects.github.io/review_Repository/
repo_url: https://github.com/5B-Projects/review_Repository
repo_name: 5B-Projects/review_Repository

theme:
  name: material
  language: ja
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: teal

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      lang: ja
  - glightbox

nav:
  - 00 概要:
      - Metis 設計資料: index.md
  - 01 設計範囲:
      - 資料構成: review-scope.md
  - 05 コンポーネントツリー図:
      - 見方と粒度: 05-component-tree.md
  - 06 画面データ要求:
      - コア画面のデータ要求: 06-screen-data-requirements.md
  - 07 ER図:
      - ER図の見方: 07-er.md
